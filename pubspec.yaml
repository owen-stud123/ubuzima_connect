name: ubuzima_connect
description: A Flutter app for healthcare services
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0

  # Google Sign-In
  google_sign_in: ^6.2.2

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.3.3

  # UUID
  uuid: ^4.5.1

  # URL Launcher (for email)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
